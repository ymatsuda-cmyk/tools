<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ж°—гҒ«гҒӘгӮӢиЁҳдәӢ | AI Dashboard</title>
<style>
  :root {
    --bg: #0A0E1A;
    --surface: #111827;
    --surface2: #1A2235;
    --border: #1E293B;
    --accent: #3B82F6;
    --accent2: #10B981;
    --accent3: #F59E0B;
    --text: #F1F5F9;
    --text2: #94A3B8;
    --text3: #64748B;
    --tag-bg: #1E293B;
    --danger: #EF4444;
    --radius: 12px;
    --font: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 0;
  }

  /* гғҳгғғгғҖгғј */
  .header {
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
  }

  .header-title .icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), #6366F1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-decoration: none;
    font-family: var(--font);
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #2563EB; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-sm {
    padding: 5px 10px;
    font-size: 12px;
  }

  /* гғЎгӮӨгғігӮігғігғҶгғігғ„ */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }

  /* гғ•гӮЈгғ«гӮҝгғјгғҗгғј */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
  }

  .filter-label {
    font-size: 12px;
    color: var(--text3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
  }
  .filter-chip:hover, .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* иЁҳдәӢгӮ°гғӘгғғгғү */
  .articles-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* иЁҳдәӢгӮ«гғјгғү */
  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .article-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .article-card:hover {
    border-color: #2D3F5E;
    transform: translateX(2px);
  }
  .article-card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }

  .card-favicon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    flex-shrink: 0;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text3);
    overflow: hidden;
    margin-top: 2px;
  }
  .card-favicon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-title-wrap { flex: 1; }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
    text-decoration: none;
  }
  .card-title:hover { color: var(--accent); }

  .card-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .card-domain {
    font-size: 11px;
    color: var(--text3);
  }

  .card-date {
    font-size: 11px;
    color: var(--text3);
  }

  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .card-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    background: var(--tag-bg);
    color: var(--text3);
    border: 1px solid var(--border);
  }

  /* еұ•й–ӢгӮ»гӮҜгӮ·гғ§гғі */
  .card-expand-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    background: none;
    border: none;
    font-family: var(--font);
    padding: 0;
    transition: color 0.15s;
  }
  .card-expand-btn:hover { color: var(--accent); }
  .card-expand-btn .chevron { transition: transform 0.2s; }
  .card-expand-btn.open .chevron { transform: rotate(180deg); }

  .card-expanded {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .card-expanded.show { display: block; }

  .expand-section {
    margin-bottom: 10px;
  }
  .expand-section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .expand-section-body {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }

  /* зҠ¶ж…ӢгғҗгғғгӮё */
  .status-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-unread { background: #1D4ED820; color: #60A5FA; border: 1px solid #1D4ED840; }
  .status-summarized { background: #05966920; color: #34D399; border: 1px solid #05966940; }
  .status-reading { background: #D9770620; color: #FBBF24; border: 1px solid #D9770640; }

  /* з©әзҠ¶ж…Ӣ */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.6; max-width: 300px; margin: 0 auto; }

  /* URLиҝҪеҠ гғўгғјгғҖгғ« */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    transition: border-color 0.15s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
  }
  .form-input::placeholder { color: var(--text3); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--surface2); }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* гӮ»гғғгғҲгӮўгғғгғ—гғ‘гғҚгғ« */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }

  .setup-panel h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .setup-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .setup-row .form-input { flex: 1; }

  /* гғӯгғјгғҮгӮЈгғігӮ° */
  .loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* д»¶ж•°гғҗгғғгӮё */
  .count-badge {
    background: var(--surface2);
    color: var(--text3);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    margin-left: 4px;
  }

  /* гғҲгғјгӮ№гғҲйҖҡзҹҘ */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1E293B;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    z-index: 300;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: toastIn 0.2s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  @keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* гғ¬гӮ№гғқгғігӮ·гғ– */
  @media (max-width: 640px) {
    .header-title span { display: none; }
    .main { padding: 12px; }
    .filter-bar { gap: 6px; }
    .btn { padding: 7px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- гғҳгғғгғҖгғј -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="header-title">
      <div class="icon">рҹ”–</div>
      <span>ж°—гҒ«гҒӘгӮӢиЁҳдәӢ</span>
    </a>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" onclick="toggleSetup()">вҡҷпёҸ иЁӯе®ҡ</button>
      <button class="btn btn-primary" onclick="openAddModal()">пјӢ иҝҪеҠ </button>
      <button class="btn btn-secondary btn-sm" id="syncBtn" onclick="syncFromNotion()">рҹ”„ еҗҢжңҹ</button>
    </div>
  </div>
</header>

<!-- гӮ»гғғгғҲгӮўгғғгғ—гғ‘гғҚгғ« -->
<div class="main">
  <div id="setupPanel" class="setup-panel" style="display:none">
    <h3>вҡҷпёҸ Notion API иЁӯе®ҡ</h3>
    <div class="setup-row">
      <input type="password" class="form-input" id="notionToken" placeholder="Notion Integration Token (secret_...)" />
      <button class="btn btn-secondary btn-sm" onclick="saveConfig()">дҝқеӯҳ</button>
    </div>
    <div class="setup-row">
      <input type="text" class="form-input" id="notionDbId" placeholder="гғҮгғјгӮҝгғҷгғјгӮ№ID (32жЎҒгҒ®иӢұж•°еӯ—)" />
    </div>
    <p style="font-size:12px;color:var(--text3);margin-top:8px">
      рҹ’Ў NotionгҒ§гҖҢж°—гҒ«гҒӘгӮӢиЁҳдәӢгҖҚгғҮгғјгӮҝгғҷгғјгӮ№гӮ’дҪңжҲҗ вҶ’ гӮӨгғігғҶгӮ°гғ¬гғјгӮ·гғ§гғігӮ’DBгҒ«жҺҘз¶ҡ вҶ’ TokenгҒЁDB IDгӮ’е…ҘеҠӣ
    </p>
  </div>

  <!-- гғ•гӮЈгғ«гӮҝгғјгғҗгғј -->
  <div class="filter-bar">
    <span class="filter-label">гӮҝгӮ°пјҡ</span>
    <button class="filter-chip active" onclick="filterTag(this, '')" data-tag="">гҒҷгҒ№гҒҰ<span class="count-badge" id="countAll">0</span></button>
    <button class="filter-chip" onclick="filterTag(this, 'AI')" data-tag="AI">AI</button>
    <button class="filter-chip" onclick="filterTag(this, 'гғӯгғңгғғгғҲ')" data-tag="гғӯгғңгғғгғҲ">гғӯгғңгғғгғҲ</button>
    <button class="filter-chip" onclick="filterTag(this, 'гғ“гӮёгғҚгӮ№')" data-tag="гғ“гӮёгғҚгӮ№">гғ“гӮёгғҚгӮ№</button>
    <button class="filter-chip" onclick="filterTag(this, 'жҠҖиЎ“')" data-tag="жҠҖиЎ“">жҠҖиЎ“</button>
    <button class="filter-chip" onclick="filterTag(this, 'ж”ҝзӯ–')" data-tag="ж”ҝзӯ–">ж”ҝзӯ–</button>
    <button class="filter-chip" onclick="filterTag(this, 'жңӘиӘӯ')" data-tag="__unread">жңӘиӘӯгҒ®гҒҝ</button>
  </div>

  <!-- иЁҳдәӢдёҖиҰ§ -->
  <div class="articles-grid" id="articlesGrid">
    <!-- JS гҒ§жҸҸз”» -->
  </div>
</div>

<!-- URLиҝҪеҠ гғўгғјгғҖгғ« -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">рҹ”– иЁҳдәӢгӮ’иҝҪеҠ </div>

    <div class="form-group">
      <label class="form-label">URL *</label>
      <input type="url" class="form-input" id="inputUrl" placeholder="https://..." oninput="onUrlChange()" />
    </div>

    <div class="form-group">
      <label class="form-label">гӮҝгӮӨгғҲгғ« *</label>
      <input type="text" class="form-input" id="inputTitle" placeholder="иЁҳдәӢгӮҝгӮӨгғҲгғ«" />
    </div>

    <div class="form-group">
      <label class="form-label">гғЎгғўпјҲд»»ж„Ҹпјү</label>
      <textarea class="form-textarea" id="inputMemo" placeholder="ж°—гҒ«гҒӘгҒЈгҒҹзҗҶз”ұгӮ„ж„ҹжғі..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">гӮҝгӮ°пјҲгӮ«гғігғһеҢәеҲҮгӮҠпјү</label>
      <input type="text" class="form-input" id="inputTags" placeholder="AI, гғӯгғңгғғгғҲ, гғ“гӮёгғҚгӮ№" />
    </div>

    <div class="form-group">
      <label class="form-label">зҠ¶ж…Ӣ</label>
      <select class="form-select" id="inputStatus">
        <option value="жңӘиӘӯ">рҹ“Ҙ жңӘиӘӯ</option>
        <option value="иӘӯжӣёдёӯ">рҹ“– иӘӯжӣёдёӯ</option>
        <option value="иҰҒзҙ„жёҲгҒҝ">вң… иҰҒзҙ„жёҲгҒҝ</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddModal()">гӮӯгғЈгғігӮ»гғ«</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveArticle()">рҹ’ҫ дҝқеӯҳ</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// иЁӯе®ҡ
// ============================================================
const CORS_PROXY = 'https://api.allorigins.win/get?url='; // Notion APIгҒҜзӣҙжҺҘгӮўгӮҜгӮ»гӮ№еҸҜ

let CONFIG = {
  notionToken: '',
  notionDbId: '',
};

let articles = [];
let currentTagFilter = '';

// ============================================================
// еҲқжңҹеҢ–
// ============================================================
window.onload = function() {
  loadConfig();
  loadLocalArticles();
  renderArticles();

  // URLгғ‘гғ©гғЎгғјгӮҝгҒӢгӮүгҒ®иҮӘеӢ•е…ҘеҠӣпјҲiPhoneе…ұжңүгӮ·гғјгғҲеҜҫеҝңпјү
  const params = new URLSearchParams(location.search);
  const sharedUrl = params.get('url') || params.get('text');
  const sharedTitle = params.get('title');
  if (sharedUrl) {
    document.getElementById('inputUrl').value = sharedUrl;
    if (sharedTitle) document.getElementById('inputTitle').value = sharedTitle;
    openAddModal();
  }
};

// ============================================================
// иЁӯе®ҡгҒ®дҝқеӯҳ/иӘӯгҒҝиҫјгҒҝ
// ============================================================
function loadConfig() {
  try {
    const saved = localStorage.getItem('bm_config');
    if (saved) CONFIG = { ...CONFIG, ...JSON.parse(saved) };
    if (CONFIG.notionToken) document.getElementById('notionToken').value = CONFIG.notionToken;
    if (CONFIG.notionDbId) document.getElementById('notionDbId').value = CONFIG.notionDbId;
  } catch(e) {}
}

function saveConfig() {
  CONFIG.notionToken = document.getElementById('notionToken').value.trim();
  CONFIG.notionDbId = document.getElementById('notionDbId').value.trim();
  localStorage.setItem('bm_config', JSON.stringify(CONFIG));
  showToast('вң… иЁӯе®ҡгӮ’дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ');
  toggleSetup();
}

// ============================================================
// гғӯгғјгӮ«гғ«гӮ№гғҲгғ¬гғјгӮё
// ============================================================
function loadLocalArticles() {
  try {
    const saved = localStorage.getItem('bm_articles');
    if (saved) articles = JSON.parse(saved);
  } catch(e) { articles = []; }
}

function saveLocalArticles() {
  localStorage.setItem('bm_articles', JSON.stringify(articles));
}

// ============================================================
// Notion API
// ============================================================
async function notionFetch(path, method = 'GET', body = null) {
  if (!CONFIG.notionToken) throw new Error('Notion Token гҒҢиЁӯе®ҡгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“');

  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${CONFIG.notionToken}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json',
    }
  };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(`https://api.notion.com/v1${path}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Notion API error: ${res.status}`);
  }
  return res.json();
}

// NotionгҒӢгӮүиЁҳдәӢдёҖиҰ§гӮ’еҗҢжңҹ
async function syncFromNotion() {
  if (!CONFIG.notionToken || !CONFIG.notionDbId) {
    showToast('вҡ пёҸ е…ҲгҒ«иЁӯе®ҡгҒӢгӮүNotion Token гҒЁ DB IDгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
    toggleSetup();
    return;
  }

  const btn = document.getElementById('syncBtn');
  btn.innerHTML = '<span class="loading-spinner"></span>';
  btn.disabled = true;

  try {
    const data = await notionFetch(`/databases/${CONFIG.notionDbId}/query`, 'POST', {
      sorts: [{ property: 'зҷ»йҢІж—Ҙ', direction: 'descending' }],
      page_size: 100
    });

    const notionArticles = data.results.map(page => pageToArticle(page));

    // гғӯгғјгӮ«гғ«гҒ«гҒӘгҒ„гӮӮгҒ®гӮ’гғһгғјгӮё
    const localIds = new Set(articles.filter(a => a.notionId).map(a => a.notionId));
    const newOnes = notionArticles.filter(a => !localIds.has(a.notionId));

    // NotionгҒ«гҒӮгӮӢгӮӮгҒ®гӮ’жӣҙж–°
    articles = articles.map(a => {
      if (!a.notionId) return a;
      const updated = notionArticles.find(n => n.notionId === a.notionId);
      return updated || a;
    });

    articles = [...newOnes, ...articles];
    saveLocalArticles();
    renderArticles();
    showToast(`вң… ${notionArticles.length}д»¶гӮ’еҗҢжңҹгҒ—гҒҫгҒ—гҒҹ`);
  } catch(e) {
    showToast('вқҢ еҗҢжңҹгӮЁгғ©гғј: ' + e.message);
    console.error(e);
  }

  btn.innerHTML = 'рҹ”„ еҗҢжңҹ';
  btn.disabled = false;
}

function pageToArticle(page) {
  const props = page.properties;
  const getText = (prop) => prop?.rich_text?.[0]?.plain_text || prop?.title?.[0]?.plain_text || '';
  const getSelect = (prop) => prop?.select?.name || '';
  const getMultiSelect = (prop) => (prop?.multi_select || []).map(s => s.name);
  const getUrl = (prop) => prop?.url || '';
  const getDate = (prop) => prop?.date?.start || '';

  return {
    id: page.id,
    notionId: page.id,
    title: getText(props['гӮҝгӮӨгғҲгғ«'] || props['Name'] || props['еҗҚеүҚ']),
    url: getUrl(props['URL']),
    summary: getText(props['иҰҒзҙ„']),
    memo: getText(props['гғЎгғў']),
    tags: getMultiSelect(props['гӮҝгӮ°']),
    status: getSelect(props['зҠ¶ж…Ӣ']) || 'жңӘиӘӯ',
    addedAt: getDate(props['зҷ»йҢІж—Ҙ']) || page.created_time?.slice(0,10) || '',
    domain: '',
  };
}

// NotionгҒ«гғҡгғјгӮёгӮ’иҝҪеҠ 
async function addToNotion(article) {
  if (!CONFIG.notionToken || !CONFIG.notionDbId) return null;

  const body = {
    parent: { database_id: CONFIG.notionDbId },
    properties: {
      'гӮҝгӮӨгғҲгғ«': { title: [{ text: { content: article.title } }] },
      'URL': { url: article.url },
      'гғЎгғў': { rich_text: [{ text: { content: article.memo || '' } }] },
      'гӮҝгӮ°': { multi_select: article.tags.map(t => ({ name: t })) },
      'зҠ¶ж…Ӣ': { select: { name: article.status } },
      'зҷ»йҢІж—Ҙ': { date: { start: article.addedAt } },
    }
  };

  try {
    const page = await notionFetch('/pages', 'POST', body);
    return page.id;
  } catch(e) {
    console.error('Notion add failed:', e);
    return null;
  }
}

// ============================================================
// иЁҳдәӢгҒ®иҝҪеҠ гғ»дҝқеӯҳ
// ============================================================
async function saveArticle() {
  const url = document.getElementById('inputUrl').value.trim();
  const title = document.getElementById('inputTitle').value.trim();
  const memo = document.getElementById('inputMemo').value.trim();
  const tagsRaw = document.getElementById('inputTags').value.trim();
  const status = document.getElementById('inputStatus').value;

  if (!url || !title) { showToast('вҡ пёҸ URLгҒЁгӮҝгӮӨгғҲгғ«гҒҜеҝ…й ҲгҒ§гҒҷ'); return; }

  const btn = document.getElementById('saveBtn');
  btn.innerHTML = '<span class="loading-spinner"></span> дҝқеӯҳдёӯ';
  btn.disabled = true;

  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const today = new Date().toISOString().slice(0, 10);

  const article = {
    id: Date.now().toString(),
    notionId: null,
    title,
    url,
    memo,
    tags,
    status,
    summary: '',
    addedAt: today,
    domain: getDomain(url),
  };

  // NotionгҒ«дҝқеӯҳпјҲиЁӯе®ҡжёҲгҒҝгҒ®е ҙеҗҲпјү
  if (CONFIG.notionToken && CONFIG.notionDbId) {
    try {
      const notionId = await addToNotion(article);
      if (notionId) article.notionId = notionId;
      showToast('вң… NotionгҒ«дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ');
    } catch(e) {
      showToast('вҡ пёҸ NotionдҝқеӯҳеӨұж•— вҶ’ гғӯгғјгӮ«гғ«гҒ«дҝқеӯҳ');
    }
  } else {
    showToast('вң… гғӯгғјгӮ«гғ«гҒ«дҝқеӯҳгҒ—гҒҫгҒ—гҒҹпјҲNotionжңӘиЁӯе®ҡпјү');
  }

  articles.unshift(article);
  saveLocalArticles();
  renderArticles();
  closeAddModal();

  btn.innerHTML = 'рҹ’ҫ дҝқеӯҳ';
  btn.disabled = false;
}

// ============================================================
// гғ¬гғігғҖгғӘгғігӮ°
// ============================================================
function renderArticles() {
  const grid = document.getElementById('articlesGrid');
  let filtered = articles;

  if (currentTagFilter === '__unread') {
    filtered = articles.filter(a => a.status === 'жңӘиӘӯ');
  } else if (currentTagFilter) {
    filtered = articles.filter(a => a.tags.includes(currentTagFilter));
  }

  document.getElementById('countAll').textContent = articles.length;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">рҹ”–</div>
        <h3>иЁҳдәӢгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</h3>
        <p>гҖҢпјӢ иҝҪеҠ гҖҚгғңгӮҝгғігҒӢiPhoneгҒ®е…ұжңүгӮ·гғјгғҲгҒӢгӮүж°—гҒ«гҒӘгӮӢиЁҳдәӢгӮ’зҷ»йҢІгҒ—гҒҫгҒ—гӮҮгҒҶ</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = filtered.map((a, i) => renderCard(a, i)).join('');
}

function renderCard(a, i) {
  const domain = a.domain || getDomain(a.url);
  const faviconUrl = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=32` : '';
  const statusClass = a.status === 'жңӘиӘӯ' ? 'status-unread' : a.status === 'иҰҒзҙ„жёҲгҒҝ' ? 'status-summarized' : 'status-reading';
  const statusLabel = a.status === 'жңӘиӘӯ' ? 'рҹ“Ҙ жңӘиӘӯ' : a.status === 'иҰҒзҙ„жёҲгҒҝ' ? 'вң… иҰҒзҙ„жёҲгҒҝ' : 'рҹ“– иӘӯжӣёдёӯ';

  const tagsHtml = a.tags.length
    ? a.tags.map(t => `<span class="card-tag">${t}</span>`).join('')
    : '';

  const hasExtra = a.summary || a.memo;

  return `
    <div class="article-card">
      <div class="card-top">
        <div class="card-favicon">
          ${faviconUrl ? `<img src="${faviconUrl}" onerror="this.style.display='none'">` : 'рҹ”—'}
        </div>
        <div class="card-title-wrap">
          <a class="card-title" href="${escHtml(a.url)}" target="_blank" rel="noopener">${escHtml(a.title)}</a>
          <div class="card-meta">
            ${domain ? `<span class="card-domain">${escHtml(domain)}</span>` : ''}
            <span class="card-date">${fmtDate(a.addedAt)}</span>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
            ${a.notionId ? '<span style="font-size:10px;color:var(--text3)">рҹ“ҳ Notion</span>' : ''}
          </div>
        </div>
      </div>

      ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}

      ${a.summary ? `<div class="card-summary">${escHtml(a.summary)}</div>` : ''}

      ${hasExtra ? `
        <button class="card-expand-btn" id="expBtn-${i}" onclick="toggleExpand(${i})">
          <span class="chevron">в–ј</span> и©ізҙ°гӮ’иЎЁзӨә
        </button>
        <div class="card-expanded" id="expBody-${i}">
          ${a.memo ? `
            <div class="expand-section">
              <div class="expand-section-label">рҹ’¬ гғЎгғў</div>
              <div class="expand-section-body">${escHtml(a.memo)}</div>
            </div>
          ` : ''}
        </div>
      ` : ''}

      <div class="card-actions">
        <a class="btn btn-secondary btn-sm" href="${escHtml(a.url)}" target="_blank" rel="noopener">рҹ”— й–ӢгҒҸ</a>
        <button class="btn btn-secondary btn-sm" onclick="deleteArticle('${escHtml(a.id)}')">рҹ—‘пёҸ</button>
        <div style="flex:1"></div>
        ${a.notionId ? '' : `<button class="btn btn-secondary btn-sm" onclick="pushToNotion('${escHtml(a.id)}')">рҹ“ҳ NotionгҒё</button>`}
      </div>
    </div>
  `;
}

function toggleExpand(i) {
  const btn = document.getElementById(`expBtn-${i}`);
  const body = document.getElementById(`expBody-${i}`);
  btn.classList.toggle('open');
  body.classList.toggle('show');
  btn.querySelector('.chevron').textContent = btn.classList.contains('open') ? 'в–І' : 'в–ј';
  btn.innerHTML = btn.innerHTML.replace(/и©ізҙ°гӮ’(иЎЁзӨә|й–үгҒҳгӮӢ)/, btn.classList.contains('open') ? 'и©ізҙ°гӮ’й–үгҒҳгӮӢ' : 'и©ізҙ°гӮ’иЎЁзӨә');
}

// ============================================================
// гғ•гӮЈгғ«гӮҝгғј
// ============================================================
function filterTag(el, tag) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentTagFilter = tag;
  renderArticles();
}

// ============================================================
// еүҠйҷӨ
// ============================================================
function deleteArticle(id) {
  if (!confirm('гҒ“гҒ®иЁҳдәӢгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  articles = articles.filter(a => a.id !== id);
  saveLocalArticles();
  renderArticles();
  showToast('рҹ—‘пёҸ еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ');
}

// ============================================================
// NotionгҒёеҖӢеҲҘгғ—гғғгӮ·гғҘ
// ============================================================
async function pushToNotion(id) {
  if (!CONFIG.notionToken || !CONFIG.notionDbId) {
    showToast('вҡ пёҸ NotionиЁӯе®ҡгҒҢеҝ…иҰҒгҒ§гҒҷ');
    toggleSetup();
    return;
  }
  const article = articles.find(a => a.id === id);
  if (!article) return;

  try {
    const notionId = await addToNotion(article);
    if (notionId) {
      article.notionId = notionId;
      saveLocalArticles();
      renderArticles();
      showToast('вң… NotionгҒ«дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ');
    }
  } catch(e) {
    showToast('вқҢ NotionдҝқеӯҳеӨұж•—: ' + e.message);
  }
}

// ============================================================
// гғўгғјгғҖгғ«
// ============================================================
function openAddModal() {
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('inputUrl').focus(), 100);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
  ['inputUrl','inputTitle','inputMemo','inputTags'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('inputStatus').value = 'жңӘиӘӯ';
}

function onUrlChange() {
  const url = document.getElementById('inputUrl').value.trim();
  const titleInput = document.getElementById('inputTitle');
  if (url && !titleInput.value) {
    try {
      const domain = new URL(url).hostname.replace('www.', '');
      titleInput.placeholder = `${domain} гҒ®иЁҳдәӢ`;
    } catch(e) {}
  }
}

// ============================================================
// гӮ»гғғгғҲгӮўгғғгғ—
// ============================================================
function toggleSetup() {
  const panel = document.getElementById('setupPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

// ============================================================
// гғҰгғјгғҶгӮЈгғӘгғҶгӮЈ
// ============================================================
function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); }
  catch(e) { return ''; }
}

function fmtDate(s) {
  if (!s) return '';
  try {
    const d = new Date(s);
    return `${d.getMonth()+1}/${d.getDate()}`;
  } catch(e) { return s; }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, duration = 3000) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// гғўгғјгғҖгғ«еӨ–гӮҜгғӘгғғгӮҜгҒ§й–үгҒҳгӮӢ
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});
</script>
