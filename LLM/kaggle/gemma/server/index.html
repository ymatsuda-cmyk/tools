<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaggle Notebook Controller</title>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent-dim:#1f4068;
      --danger:    #f85149;
      --success:   #3fb950;
      --warning:   #d29922;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-ui:   'Inter', 'Hiragino Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    header { text-align: center; margin-bottom: 2rem; }
    header .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
    header p  { color: var(--muted); font-size: 0.82rem; margin-top: 0.3rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 460px;
    }
    .field-label {
      font-size: 0.68rem;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      display: block;
    }
    .field-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1.25rem;
    }
    .field-input:focus { border-color: var(--accent); }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.25rem;
      font-size: 0.82rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.running  { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
    .dot.queued   { background: var(--warning); }
    .dot.complete { background: var(--accent); }
    .dot.error    { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .status-text { flex: 1; }
    .status-time { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); }

    .error-banner {
      display: none;
      background: rgba(248,81,73,0.1);
      border: 1px solid var(--danger);
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      font-size: 0.78rem;
      color: var(--danger);
      margin-bottom: 1rem;
      line-height: 1.5;
      word-break: break-all;
    }
    .error-banner.visible { display: block; }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .btn {
      padding: 0.6rem 0;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: var(--font-ui);
    }
    .btn:active  { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-start  { background: var(--success);   color: #000; }
    .btn-status { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .btn-stop   { background: transparent; color: var(--danger); border-color: var(--danger); }
    .btn-start:hover:not(:disabled)  { opacity: 0.85; }
    .btn-status:hover:not(:disabled) { background: #2a4f7a; }
    .btn-stop:hover:not(:disabled)   { background: rgba(248,81,73,0.1); }

    .log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      line-height: 1.6;
      color: var(--muted);
      min-height: 90px;
      max-height: 160px;
      overflow-y: auto;
    }
    .le { margin-bottom: 0.15rem; }
    .le.ok   { color: var(--success); }
    .le.err  { color: var(--danger);  }
    .le.info { color: var(--accent);  }
    .le.warn { color: var(--warning); }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.9rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .toggle { display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
    .toggle input { accent-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Kaggle · GPU Control</div>
  <h1>Notebook Controller</h1>
  <p>起動 · 監視 · 停止</p>
</header>

<div class="card">
  <span class="field-label">GAS Endpoint URL</span>
  <input id="gasUrl" class="field-input" type="text"
    placeholder="https://script.google.com/macros/s/xxxxxx/exec"
    spellcheck="false" />

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">未確認</span>
    <span class="status-time" id="statusTime"></span>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="btn-group">
    <button class="btn btn-start"  id="btnStart"  onclick="startNotebook()">▶ 起動</button>
    <button class="btn btn-status" id="btnStatus" onclick="checkStatus()">↻ 確認</button>
    <button class="btn btn-stop"   id="btnStop"   onclick="stopNotebook()">■ 停止</button>
  </div>

  <span class="field-label">ログ</span>
  <div class="log" id="log"></div>

  <div class="footer">
    <label class="toggle">
      <input type="checkbox" id="autoRefresh" onchange="toggleAuto()" />
      30秒ごとに自動更新
    </label>
    <span id="nextRefresh"></span>
  </div>
</div>

<script>
  // GAS URLをlocalStorageに保存
  var urlInput = document.getElementById('gasUrl');
  urlInput.value = localStorage.getItem('gasUrl') || '';
  urlInput.addEventListener('input', function() {
    localStorage.setItem('gasUrl', urlInput.value.trim());
  });

  var autoTimer = null;
  var cdTimer   = null;

  function log(msg, type) {
    type = type || 'default';
    var el  = document.getElementById('log');
    var now = new Date().toLocaleTimeString('ja-JP');
    var div = document.createElement('div');
    div.className = 'le ' + type;
    div.textContent = '[' + now + '] ' + msg;
    el.prepend(div);
  }

  function showError(msg) {
    var el = document.getElementById('errorBanner');
    if (msg) { el.textContent = '⚠ ' + msg; el.classList.add('visible'); }
    else      { el.classList.remove('visible'); }
  }

  function updateStatus(status, time) {
    var dot  = document.getElementById('dot');
    var text = document.getElementById('statusText');
    var ts   = document.getElementById('statusTime');
    dot.className = 'dot';
    var map = {
      running:            ['running',  '実行中'],
      queued:             ['queued',   'キュー待ち'],
      complete:           ['complete', '完了'],
      error:              ['error',    'エラー'],
      cancelAcknowledged: ['',         'キャンセル済み'],
    };
    var pair  = map[status] || ['', status || '不明'];
    if (pair[0]) dot.classList.add(pair[0]);
    text.textContent = pair[1];
    ts.textContent   = time ? new Date(time).toLocaleString('ja-JP') : '';
  }

  function setLoading(v) {
    ['btnStart','btnStatus','btnStop'].forEach(function(id) {
      document.getElementById(id).disabled = v;
    });
  }

  // ── JSONP方式（GET / ステータス確認）──
  function jsonpGet(params, callback) {
    var url = urlInput.value.trim();
    if (!url) { log('GAS URLが未設定です', 'err'); callback(null); return; }

    var cbName = 'cb_' + Date.now();
    var script = document.createElement('script');
    var qs = '';
    params.callback = cbName;
    Object.keys(params).forEach(function(k) { qs += '&' + k + '=' + encodeURIComponent(params[k]); });
    script.src = url + '?' + qs.slice(1);

    var timer = setTimeout(function() {
      cleanup();
      log('タイムアウト（30秒）', 'err');
      callback(null);
    }, 30000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) {
      cleanup();
      callback(data);
    };

    script.onerror = function() {
      cleanup();
      log('スクリプト読み込みエラー', 'err');
      callback(null);
    };

    document.head.appendChild(script);
  }

  // ── フォームsubmit方式（POST / 起動・停止）──
  // GASはform submitのPOSTを受け付けるが、レスポンスを直接読めない
  // そのため hidden iframe + form で送信し、完了後にステータス確認で結果を確認する
  function formPost(action, onDone) {
    var url = urlInput.value.trim();
    if (!url) { log('GAS URLが未設定です', 'err'); onDone(null); return; }

    // iframeを使って非同期送信
    var iframeName = 'iframe_' + Date.now();
    var iframe = document.createElement('iframe');
    iframe.name = iframeName;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    var form = document.createElement('form');
    form.method = 'POST';
    form.action = url;
    form.target = iframeName;
    form.style.display = 'none';

    // actionをhiddenフィールドで渡す
    var input = document.createElement('input');
    input.type  = 'hidden';
    input.name  = 'action';
    input.value = action;
    form.appendChild(input);

    document.body.appendChild(form);

    var timer = setTimeout(function() {
      cleanup();
      onDone({ success: true, message: 'リクエスト送信完了（結果は確認ボタンで確認）' });
    }, 5000);

    iframe.onload = function() {
      clearTimeout(timer);
      cleanup();
      onDone({ success: true, message: 'リクエスト送信完了' });
    };

    function cleanup() {
      if (form.parentNode)   form.parentNode.removeChild(form);
      if (iframe.parentNode) setTimeout(function() { iframe.parentNode.removeChild(iframe); }, 1000);
    }

    form.submit();
  }

  // ── 起動 ──
  function startNotebook() {
    showError('');
    log('起動リクエストを送信しています…', 'info');
    setLoading(true);
    formPost('start', function(data) {
      setLoading(false);
      if (data && data.success) {
        log('起動リクエスト送信完了 — 数十秒後に確認してください', 'ok');
        // 10秒後に自動でステータス確認
        setTimeout(checkStatus, 10000);
      } else {
        log('送信失敗', 'err');
        showError('送信に失敗しました');
      }
    });
  }

  // ── ステータス確認（JSONP）──
  function checkStatus() {
    showError('');
    log('ステータスを確認しています…', 'info');
    setLoading(true);
    jsonpGet({ action: 'status' }, function(data) {
      setLoading(false);
      if (!data) { showError('レスポンスを取得できませんでした'); return; }
      if (data.success) {
        updateStatus(data.status, data.lastRunTime);
        log('ステータス: ' + data.status, 'ok');
      } else {
        log('確認失敗: ' + (data.error || ''), 'err');
        showError((data.error || '確認失敗') + (data.detail ? '\n' + data.detail : ''));
      }
    });
  }

  // ── 停止 ──
  function stopNotebook() {
    if (!confirm('Notebookを停止しますか？')) return;
    showError('');
    log('停止リクエストを送信しています…', 'warn');
    setLoading(true);
    formPost('stop', function(data) {
      setLoading(false);
      if (data && data.success) {
        log('停止リクエスト送信完了', 'ok');
        updateStatus('cancelAcknowledged', null);
      } else {
        log('送信失敗', 'err');
        showError('送信に失敗しました');
      }
    });
  }

  // ── 自動更新 ──
  function toggleAuto() {
    var on = document.getElementById('autoRefresh').checked;
    if (on) {
      var sec = 30;
      var tick = function() {
        document.getElementById('nextRefresh').textContent = '次の更新: ' + sec + '秒後';
        if (--sec < 0) sec = 30;
      };
      tick();
      cdTimer   = setInterval(tick, 1000);
      autoTimer = setInterval(function() { checkStatus(); sec = 30; }, 30000);
    } else {
      clearInterval(autoTimer);
      clearInterval(cdTimer);
      document.getElementById('nextRefresh').textContent = '';
    }
  }
</script>
</body>
</html>
