<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaggle Notebook Controller</title>
  <style>
    :root {
      --bg:        #f5f2ed;
      --surface:   #faf8f5;
      --border:    #ddd8d0;
      --accent:    #3d6fcf;
      --accent-dim:#e8eef9;
      --danger:    #c0392b;
      --success:   #2e7d45;
      --warning:   #a05c00;
      --text:      #2c2825;
      --muted:     #7a726a;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-ui:   'Inter', 'Hiragino Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    header { text-align: center; margin-bottom: 2rem; }
    header .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
    header p  { color: var(--muted); font-size: 0.82rem; margin-top: 0.3rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 460px;
    }
    .field-label {
      font-size: 0.68rem;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      display: block;
    }
    .field-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1.25rem;
    }
    .field-input:focus { border-color: var(--accent); }

    .metrics-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .metric-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
    }
    .metric-label {
      font-size: 0.62rem;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .metric-value {
      font-size: 1.05rem;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    .metric-value.running { color: var(--success); }
    .metric-value.warn    { color: var(--warning); }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1.25rem;
      font-size: 0.82rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.running  { background: var(--success); box-shadow: 0 0 5px rgba(46,125,69,0.4); animation: pulse 2s infinite; }
    .dot.queued   { background: var(--warning); }
    .dot.complete { background: var(--accent); }
    .dot.error    { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .status-text { flex: 1; }
    .status-time { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); }

    .error-banner {
      display: none;
      background: rgba(192,57,43,0.08);
      border: 1px solid var(--danger);
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      font-size: 0.78rem;
      color: var(--danger);
      margin-bottom: 1rem;
      line-height: 1.5;
      word-break: break-all;
    }
    .error-banner.visible { display: block; }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .btn {
      padding: 0.6rem 0;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: var(--font-ui);
    }
    .btn:active  { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-start  { background: var(--success);   color: #000; }
    .btn-status { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .btn-stop   { background: transparent; color: var(--danger); border-color: var(--danger); }
    .btn-start:hover:not(:disabled)  { opacity: 0.85; }
    .btn-status:hover:not(:disabled) { background: #d0dcf5; }
    .btn-stop:hover:not(:disabled)   { background: rgba(192,57,43,0.08); }

    .log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      line-height: 1.6;
      color: var(--muted);
      min-height: 90px;
      max-height: 160px;
      overflow-y: auto;
    }
    .le { margin-bottom: 0.15rem; }
    .le.ok   { color: var(--success); }
    .le.err  { color: var(--danger);  }
    .le.info { color: var(--accent);  }
    .le.warn { color: var(--warning); }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.9rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .toggle { display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
    .toggle input { accent-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Kaggle · GPU Control</div>
  <h1>Notebook Controller</h1>
  <p>起動 · 監視 · 停止</p>
</header>

<div class="card">
  <span class="field-label">GAS Endpoint URL</span>
  <input id="gasUrl" class="field-input" type="text"
    placeholder="https://script.google.com/macros/s/xxxxxx/exec"
    spellcheck="false" />

  <div class="metrics-row">
    <div class="metric-card">
      <div class="metric-label">実行時間</div>
      <div class="metric-value" id="elapsedValue">--:--:--</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">残り時間</div>
      <div class="metric-value" id="remainValue">--:--:--</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">GPU使用率</div>
      <div class="metric-value" id="gpuValue">--%</div>
    </div>
  </div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">未確認</span>
    <span class="status-time" id="statusTime"></span>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="btn-group">
    <button class="btn btn-start"  id="btnStart"  onclick="startNotebook()">▶ 起動</button>
    <button class="btn btn-status" id="btnStatus" onclick="checkStatus()">↻ 確認</button>
    <button class="btn btn-stop"   id="btnStop"   onclick="stopNotebook()">■ 停止(Kaggle)</button>
  </div>

  <span class="field-label">ログ</span>
  <div class="log" id="log"></div>

  <div class="footer">
    <label class="toggle">
      <input type="checkbox" id="autoRefresh" onchange="toggleAuto()" />
      30秒ごとに自動更新
    </label>
    <span id="nextRefresh"></span>
  </div>
</div>

<script>
  var urlInput = document.getElementById('gasUrl');
  urlInput.value = localStorage.getItem('gasUrl') || '';
  urlInput.addEventListener('input', function() {
    localStorage.setItem('gasUrl', urlInput.value.trim());
  });

  var autoTimer    = null;
  var cdTimer      = null;
  var elapsedTimer = null;
  var sessionStartTime = null;
  var KAGGLE_LIMIT_SEC = 9 * 3600;

  function pad(n) { return String(n).padStart(2, '0'); }
  function fmtElapsed(totalSec) {
    var h = Math.floor(totalSec / 3600);
    var m = Math.floor((totalSec % 3600) / 60);
    var s = totalSec % 60;
    return pad(h) + ':' + pad(m) + ':' + pad(s);
  }

  function updateElapsedDisplay() {
    if (!sessionStartTime) return;
    var elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    var remain  = Math.max(0, KAGGLE_LIMIT_SEC - elapsed);
    var elEl = document.getElementById('elapsedValue');
    var reEl = document.getElementById('remainValue');
    elEl.textContent = fmtElapsed(elapsed);
    reEl.textContent = fmtElapsed(remain);
    elEl.className = 'metric-value ' + (elapsed > 7 * 3600 ? 'warn' : 'running');
    reEl.className = 'metric-value ' + (remain < 2 * 3600 ? 'warn' : 'running');
    if (remain === 0) { stopElapsedTimer(); }
  }

  function startElapsedTimer(startTs) {
    sessionStartTime = startTs;
    stopElapsedTimer();
    updateElapsedDisplay();
    elapsedTimer = setInterval(updateElapsedDisplay, 1000);
  }
  function stopElapsedTimer() {
    clearInterval(elapsedTimer);
    elapsedTimer = null;
  }
  function resetElapsedDisplay() {
    stopElapsedTimer();
    sessionStartTime = null;
    localStorage.removeItem('kaggle_session_start');
    document.getElementById('elapsedValue').textContent = '--:--:--';
    document.getElementById('elapsedValue').className   = 'metric-value';
    document.getElementById('remainValue').textContent  = '--:--:--';
    document.getElementById('remainValue').className    = 'metric-value';
    document.getElementById('gpuValue').textContent     = '--%';
    document.getElementById('gpuValue').className       = 'metric-value';
  }

  function log(msg, type) {
    type = type || 'default';
    var el  = document.getElementById('log');
    var now = new Date().toLocaleTimeString('ja-JP');
    var div = document.createElement('div');
    div.className = 'le ' + type;
    div.textContent = '[' + now + '] ' + msg;
    el.prepend(div);
  }

  function showError(msg) {
    var el = document.getElementById('errorBanner');
    if (msg) { el.textContent = msg; el.classList.add('visible'); }
    else      { el.classList.remove('visible'); }
  }

  function updateStatus(status, time) {
    var dot  = document.getElementById('dot');
    var text = document.getElementById('statusText');
    var ts   = document.getElementById('statusTime');
    dot.className = 'dot';
    var map = {
      running:            ['running',  '実行中'],
      queued:             ['queued',   'キュー待ち'],
      complete:           ['complete', '完了'],
      error:              ['error',    'エラー'],
      cancelAcknowledged: ['',         'キャンセル済み'],
    };
    var pair = map[status] || ['', status || '不明'];
    if (pair[0]) dot.classList.add(pair[0]);
    text.textContent = pair[1];
    ts.textContent   = time ? new Date(time).toLocaleString('ja-JP') : '';

    if (status === 'running') {
      var stored = localStorage.getItem('kaggle_session_start');
      if (!stored) {
        var ts = time ? new Date(time).getTime() : Date.now();
        localStorage.setItem('kaggle_session_start', String(ts));
        stored = String(ts);
      }
      startElapsedTimer(parseInt(stored, 10));
    } else if (status === 'complete' || status === 'cancelAcknowledged' || status === 'error') {
      localStorage.removeItem('kaggle_session_start');
      stopElapsedTimer();
      document.getElementById('elapsedValue').className = 'metric-value';
      document.getElementById('remainValue').className  = 'metric-value';
    }
  }

  function setLoading(v) {
    ['btnStart','btnStatus','btnStop'].forEach(function(id) {
      document.getElementById(id).disabled = v;
    });
  }

  function jsonpGet(params, callback) {
    var url = urlInput.value.trim();
    if (!url) { log('GAS URLが未設定です', 'err'); callback(null); return; }
    var cbName = 'cb_' + Date.now();
    var script = document.createElement('script');
    params.callback = cbName;
    var qs = Object.keys(params).map(function(k) {
      return k + '=' + encodeURIComponent(params[k]);
    }).join('&');
    script.src = url + '?' + qs;
    var timer = setTimeout(function() {
      cleanup(); log('タイムアウト（60秒）', 'err'); callback(null);
    }, 60000);
    function cleanup() {
      clearTimeout(timer); delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(data) { cleanup(); callback(data); };
    script.onerror = function() { cleanup(); log('接続エラー', 'err'); callback(null); };
    document.head.appendChild(script);
  }

  function startNotebook() {
    showError('');
    log('起動リクエストを送信しています…', 'info');
    setLoading(true);
    jsonpGet({ action: 'start' }, function(data) {
      setLoading(false);
      if (!data) { showError('レスポンスを取得できませんでした'); return; }
      if (data.success) {
        log('起動リクエスト送信完了: ' + (data.message || ''), 'ok');
        setTimeout(checkStatus, 10000);
      } else {
        log('起動失敗: ' + (data.message || ''), 'err');
        showError(data.message || '起動失敗');
      }
    });
  }

  function checkStatus() {
    showError('');
    log('ステータスを確認しています…', 'info');
    setLoading(true);
    jsonpGet({ action: 'status' }, function(data) {
      setLoading(false);
      if (!data) { showError('レスポンスを取得できませんでした'); return; }
      if (data.success) {
        updateStatus(data.status, data.lastRunTime);
        if (data.gpu_utilization !== undefined) {
          var gpuEl = document.getElementById('gpuValue');
          gpuEl.textContent = Math.round(data.gpu_utilization) + '%';
          gpuEl.className   = 'metric-value ' + (data.gpu_utilization > 80 ? 'running' : '');
        }
        log('ステータス: ' + data.status, 'ok');
      } else {
        log('確認失敗: ' + (data.error || ''), 'err');
        showError(data.error || '確認失敗');
      }
    });
  }

  function stopNotebook() {
    window.open('https://www.kaggle.com/code/ymatsuda2025/gemma4-12b', '_blank');
    log('Kaggleページを開きました → View Active Events → Stop Session', 'warn');
    resetElapsedDisplay();
  }

  function toggleAuto() {
    var on = document.getElementById('autoRefresh').checked;
    if (on) {
      var sec = 30;
      var tick = function() {
        document.getElementById('nextRefresh').textContent = '次の更新: ' + sec + '秒後';
        if (--sec < 0) sec = 30;
      };
      tick();
      cdTimer   = setInterval(tick, 1000);
      autoTimer = setInterval(function() { checkStatus(); sec = 30; }, 30000);
    } else {
      clearInterval(autoTimer);
      clearInterval(cdTimer);
      document.getElementById('nextRefresh').textContent = '';
    }
  }
</script>
</body>
</html>
