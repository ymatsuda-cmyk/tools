<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kanban Demo</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <script>
    Office.onReady(() => {
      console.log("Office ready");
    });
  </script>

  <script src="kanban.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>カンバン Rev.20260409</h2>

<!-- ===================== -->
<!-- 🔄 リロード -->
<!-- ===================== -->
<div style="position:absolute; top:10px; right:10px;">
  <button onclick="init()">Reload</button>
</div>

<!-- ===================== -->
<!-- 👤 担当者 -->
<!-- ===================== -->
<h4>担当者</h4>
<div id="user-filters"></div>

<!-- ===================== -->
<!-- 📂 分類 -->
<!-- ===================== -->
<h4>分類</h4>
<div id="category-filters"></div>

<!-- ===================== -->
<!-- 📅 期間 -->
<!-- ===================== -->
<h4>期間</h4>
<div id="period-filters">
  <button data-period="all" onclick="setPeriod('all')">全期間</button>
  <button data-period="week" onclick="setPeriod('week')">今週</button>
  <button data-period="nextweek" onclick="setPeriod('nextweek')">来週</button>
  <button data-period="month" onclick="setPeriod('month')">今月</button>
</div>

<hr>

<!-- ===================== -->
<!-- 🧩 カンバン -->
<!-- ===================== -->
<div id="board">

  <div class="lane" id="todo">
    <h3>未着手</h3>
    <div class="card-list"></div>
  </div>

  <div class="lane" id="doing">
    <h3>対応中</h3>
    <div class="card-list"></div>
  </div>

  <div class="lane" id="done">
    <h3>完了</h3>
    <div class="card-list"></div>
  </div>

</div>

<!-- ===================== -->
<!-- 📝 モーダル -->
<!-- ===================== -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <h3 id="modal-title"></h3>

    <textarea id="modal-note" rows="6" style="width:100%;"></textarea>

    <div style="margin-top:10px;">
      <button onclick="saveNote()">保存</button>
      <button onclick="closeModal()">閉じる</button>
    </div>

  </div>
</div>

</body>
</html>
