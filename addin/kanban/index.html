<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kanban</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="kanban.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 10px;
    }

    h2 {
      margin-bottom: 10px;
    }

    /* ===== ツールバー ===== */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .filters {
      margin: 10px 0;
    }

    .filters div {
      margin-bottom: 5px;
    }

    button {
      margin: 2px;
      padding: 5px 10px;
      cursor: pointer;
    }

    /* 選択中 */
    .active {
      background: #0078d4;
      color: white;
    }

    /* ===== カンバン ===== */
    #board {
      display: flex;
      gap: 10px;
    }

    .lane {
      flex: 1;
      background: #f4f4f4;
      padding: 10px;
      border-radius: 5px;
    }

    .card-list {
      min-height: 200px;
    }

    .card {
      background: white;
      padding: 8px;
      margin: 5px 0;
      border: 2px solid #ccc;
      border-radius: 5px;
      cursor: pointer;
    }

    /* 期限色 */
    .overdue {
      border-color: red;
    }

    .thisweek {
      border-color: orange;
    }

    .nextweek {
      border-color: green;
    }

    .meta {
      font-size: 12px;
      color: gray;
    }

    /* ===== モーダル ===== */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hidden {
      display: none;
    }

    .modal-content {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2>カンバン</h2>
  <button onclick="init()">🔄 Reload</button>
</div>

<!-- ===== フィルタ ===== -->
<div class="filters">

  <div>
    <b>担当者：</b>
    <div id="user-filters"></div>
  </div>

  <div>
    <b>大分類：</b>
    <div id="category-filters"></div>
  </div>

  <div>
    <b>期間：</b>
    <button onclick="setPeriod('all')">全期間</button>
    <button onclick="setPeriod('week')">今週</button>
    <button onclick="setPeriod('nextweek')">来週</button>
    <button onclick="setPeriod('month')">今月</button>
  </div>

</div>

<!-- ===== カンバン ===== -->
<div id="board">

  <div class="lane"
       id="todo"
       ondrop="onDrop(event)"
       ondragover="allowDrop(event)">
    <h3>未着手</h3>
    <div class="card-list"></div>
  </div>

  <div class="lane"
       id="doing"
       ondrop="onDrop(event)"
       ondragover="allowDrop(event)">
    <h3>対応中</h3>
    <div class="card-list"></div>
  </div>

  <div class="lane"
       id="done"
       ondrop="onDrop(event)"
       ondragover="allowDrop(event)">
    <h3>完了</h3>
    <div class="card-list"></div>
  </div>

</div>

<!-- ===== モーダル ===== -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <h3 id="modal-title"></h3>

    <textarea id="modal-note" rows="6" style="width:100%;"></textarea>

    <div style="margin-top:10px;">
      <button onclick="saveNote()">保存</button>
      <button onclick="closeModal()">閉じる</button>
    </div>

  </div>
</div>

</body>
</html>
