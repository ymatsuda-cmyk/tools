<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>Kanban</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="kanban.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ヘッダー -->
<div class="header">
  <button class="icon-btn" id="menu-btn" title="メニュー" onclick="openMenu(this)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M2.5 4.5h11M2.5 8h11M2.5 11.5h11" stroke-linecap="round"/>
    </svg>
  </button>
  <span class="title">カンバン</span>
  <span class="version" id="version-label"></span>
  <span class="spacer"></span>
  <button class="icon-btn" title="再読み込み" onclick="init()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 1.5v3h-3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="icon-btn" title="設定をリセット" onclick="resetSettings()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="8" cy="8" r="2.2"/>
      <path d="M8 1.8v2M8 12.2v2M1.8 8h2M12.2 8h2M3.6 3.6l1.4 1.4M11 11l1.4 1.4M12.4 3.6 11 5M5 11l-1.4 1.4" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<!-- フィルタバー -->
<div class="filter-bar" id="filter-bar">

  <!-- 検索（タスク名・備考・分類を横断検索） -->
  <div class="search-box" id="search-box">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="7" cy="7" r="4.5"/>
      <path d="M10.5 10.5 14 14" stroke-linecap="round"/>
    </svg>
    <input type="search" id="search-input" placeholder="検索" autocomplete="off">
    <span class="search-hits" id="search-hits"></span>
    <button class="search-clear" id="search-clear" title="クリア">✕</button>
  </div>

  <!-- 担当者チップ -->
  <button class="chip" id="chip-user" onclick="toggleDropdown('dd-user', this)"></button>

  <!-- 分類チップ -->
  <button class="chip" id="chip-cat" onclick="toggleDropdown('dd-cat', this)"></button>

  <!-- 期間セグメント -->
  <div class="segment" id="seg-period">
    <button data-p="all">全て</button>
    <button data-p="past">以前</button>
    <button data-p="week">今週</button>
    <button data-p="nextweek">来週</button>
    <button data-p="future">以降</button>
    <button data-p="today">本日★</button>
    <button data-p="todo">TODO</button>
  </div>

  <!-- 保留トグル -->
  <label class="held-toggle" id="held-toggle" onclick="toggleHeldDisplay(event)">
    <span class="switch"></span>保留
  </label>

  <!-- ドロップダウン：担当者 -->
  <div class="dropdown" id="dd-user">
    <div class="dd-label">担当者で絞り込み</div>
    <div id="user-filters"></div>
  </div>

  <!-- ドロップダウン：分類（大分類＋小分類） -->
  <div class="dropdown" id="dd-cat">
    <div class="dd-label">分類で絞り込み</div>
    <div id="category-filters"></div>
    <div id="sub-category-section" style="display:none;">
      <div class="dd-label">小分類</div>
      <div id="sub-category-filters"></div>
    </div>
  </div>

</div>

<!-- ボード -->
<div id="board">

  <div class="lane" id="todo" data-lane="todo">
    <div class="lane-head">
      <span class="dot"></span><span class="name">未着手</span><span class="count">0</span>
    </div>
    <div class="card-list"></div>
  </div>

  <div class="lane" id="held" data-lane="held">
    <div class="lane-head">
      <span class="dot"></span><span class="name">保留</span><span class="count">0</span>
    </div>
    <div class="card-list"></div>
  </div>

  <div class="lane" id="doing" data-lane="doing">
    <div class="lane-head">
      <span class="dot"></span><span class="name">対応中</span><span class="count">0</span>
    </div>
    <div class="card-list"></div>
  </div>

  <div class="lane" id="done" data-lane="done">
    <div class="lane-head">
      <span class="dot"></span><span class="name">完了</span><span class="count">0</span>
    </div>
    <div class="card-list"></div>
  </div>

</div>

<!-- 備考編集モーダル -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modal-title"></h3>
    <textarea id="modal-note"></textarea>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveNote()">保存</button>
      <button class="btn-ghost" onclick="closeModal()">閉じる</button>
      <small>ESC: 閉じる</small>
    </div>
  </div>
</div>

</body>
</html>
