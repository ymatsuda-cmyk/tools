<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kanban</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="kanban.js" defer></script>

  <style>
    body { font-family: sans-serif; }

    #board { display: flex; gap: 16px; }

    .lane {
      width: 30%;
      background: #f4f4f4;
      padding: 10px;
      border-radius: 8px;
    }

    .card {
      background: white;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      cursor: grab;
      border: 2px solid transparent;
    }

    .card.overdue { border: 2px solid red; }
    .card.thisweek { border: 2px solid orange; }
    .card.nextweek { border: 2px solid green; }

    .meta { font-size: 12px; color: gray; }

    .filter-label {
      margin-right: 8px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      cursor: pointer;
      display: inline-block;
    }

    .active { background: #cce5ff; }
    .active-period { background: #ffd966; }

  </style>
</head>

<body>

<div style="display:flex; justify-content:space-between;">
  <h2>カンバン rev.20260409</h2>
  <button onclick="reloadTasks()">🔄 Reload</button>
</div>

<!-- 担当者 -->
<div id="user-filter"></div>

<!-- 期間 -->
<div id="period-filter"></div>

<div id="board">
  <div class="lane" id="todo">
    <h3>未着手</h3>
    <div class="card-list" ondragover="allowDrop(event)" ondrop="onDrop(event)"></div>
  </div>
  <div class="lane" id="doing">
    <h3>対応中</h3>
    <div class="card-list" ondragover="allowDrop(event)" ondrop="onDrop(event)"></div>
  </div>
  <div class="lane" id="done">
    <h3>完了</h3>
    <div class="card-list" ondragover="allowDrop(event)" ondrop="onDrop(event)"></div>
  </div>
</div>

<div id="modal" class="hidden">
  <h3 id="modal-title"></h3>
  <textarea id="modal-note"></textarea>
  <button onclick="saveNote()">保存</button>
  <button onclick="closeModal()">閉じる</button>
</div>

</body>
</html>
