<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>バグ管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ヘッダー -->
<header class="header">
  <button class="icon-btn" id="menu-btn" title="メニュー" onclick="openMenu(this)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M2.5 4.5h11M2.5 8h11M2.5 11.5h11" stroke-linecap="round"/>
    </svg>
  </button>
  <span class="title">バグ管理</span>
  <span class="version" id="version-label"></span>
  <span class="spacer"></span>
  <button id="btn-add-new" class="btn-primary">＋ 新規</button>
  <button id="btn-reload" class="icon-btn" title="再読み込み">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 1.5v3h-3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</header>

<!-- フィルタバー -->
<div class="filter-bar">

  <!-- 検索（タイトル・担当者・タグ・登録者を横断検索） -->
  <div class="search-box" id="search-box">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="7" cy="7" r="4.5"/>
      <path d="M10.5 10.5 14 14" stroke-linecap="round"/>
    </svg>
    <input type="search" id="filter-text" placeholder="タイトル・担当・タグを検索" autocomplete="off">
    <button class="search-clear" id="search-clear" title="クリア" type="button">✕</button>
  </div>

  <!-- 優先度・状況フィルタ（ピル型セレクト） -->
  <select id="filter-priority" class="chip-select">
    <option value="">優先度</option>
    <option value="高">高</option>
    <option value="中">中</option>
    <option value="低">低</option>
  </select>
  <select id="filter-status" class="chip-select">
    <option value="">状況</option>
    <option>新規</option>
    <option>解析</option>
    <option>修正</option>
    <option>確認</option>
    <option>再発</option>
    <option>完了</option>
  </select>

  <span id="status-msg" class="status-msg"></span>
</div>

<!-- ビュー切替（セグメントコントロール） -->
<div class="segment-bar">
  <div class="segment" role="tablist">
    <button id="btn-view-status"   class="seg-btn active" role="tab">バグ状況</button>
    <button id="btn-view-assignee" class="seg-btn"        role="tab">割り当て</button>
    <button id="btn-view-version"  class="seg-btn"        role="tab">リリース</button>
    <button id="btn-view-trend"    class="seg-btn"        role="tab">推移</button>
  </div>
</div>

<main>
  <section id="view-status" class="view active">
    <div id="kanban-board-status" class="kanban-board"></div>
  </section>

  <section id="view-assignee" class="view">
    <div id="kanban-board-assignee" class="kanban-board"></div>
  </section>

  <section id="view-version" class="view">
    <div id="kanban-board-version" class="kanban-board version-kanban"></div>
  </section>

  <section id="view-trend" class="view">
    <div class="trend-main-container">
      <div id="analysis-section" class="trend-container">
        <h3>バグ対応生産性推移</h3>
        <div class="chart-container">
          <canvas id="trendChart" width="800" height="400"></canvas>
        </div>
        <div class="stats-container">
          <h4>優先度別完了率</h4>
          <table id="statsTable" class="stats-table">
          <thead>
            <tr>
              <th rowspan="2">優先度</th>
              <th rowspan="2">総件数</th>
              <th colspan="2">修正済</th>
              <th colspan="2">完了</th>
            </tr>
            <tr>
              <th>件数</th>
              <th>完了率</th>
              <th>件数</th>
              <th>完了率</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  </section>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">バグ詳細</h2>
      <button id="modal-close" class="btn-icon">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button id="modal-save" class="btn primary">保存</button>
      <button id="modal-cancel" class="btn">閉じる</button>
    </div>
  </div>
</div>

<footer class="footer">
  <span id="env-label"></span>
  <span id="row-count"></span>
</footer>

<script>
/* ============================================================
 * UIシェル用スクリプト（app.js のロジックには手を入れない）
 *  - バージョン表示
 *  - 検索クリアボタン
 *  - 共通スライドメニュー（遅延ロード / menu.json 駆動）
 * ============================================================ */
const UI_VERSION = "rev_20260707_bugui1";
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("version-label").textContent = UI_VERSION;

  // 検索クリア（input イベントを発火して app.js のフィルタに反映）
  const input = document.getElementById("filter-text");
  const box = document.getElementById("search-box");
  const clearBtn = document.getElementById("search-clear");
  const sync = () => box.classList.toggle("has-value", input.value.trim().length > 0);
  input.addEventListener("input", sync);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && input.value) {
      e.stopPropagation(); // モーダルのEscと干渉させない
      input.value = "";
      input.dispatchEvent(new Event("input", { bubbles: true }));
    }
  });
  clearBtn.addEventListener("click", () => {
    input.value = "";
    input.dispatchEvent(new Event("input", { bubbles: true }));
    input.focus();
  });
});

/* ---- 共通スライドメニュー（カンバンと同構成） ---- */
const COMMON_BASE = "https://ymatsuda-cmyk.github.io/tools/common";
let menuReady = null;

function openMenu(btn) {
  if (!menuReady) {
    if (btn) btn.disabled = true;
    menuReady = new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = COMMON_BASE + "/slide-menu.js";
      s.onload = () => {
        SlideMenu.init({
          appName: "バグ管理",
          version: UI_VERSION,
          position: "right",
          width: 250,
          theme: { accent: "#0E7A5F" },
          footer: "© RightArm",
          currentId: "bug",                       // menu.json のidと一致で強調表示
          menuUrl: COMMON_BASE + "/menu.json",    // メニュー定義はJSONで一元管理
          localItems: [
            { section: "操作" },
            { label: "新規バグ登録", icon: "＋", onClick: () => document.getElementById("btn-add-new").click() },
            { label: "再読み込み",   icon: "🔄", onClick: () => document.getElementById("btn-reload").click() }
          ]
        });
        resolve();
      };
      s.onerror = () => {
        menuReady = null; // 失敗時は次回リトライ可能に
        reject(new Error("slide-menu.js load failed"));
      };
      document.head.appendChild(s);
    });
  }

  menuReady
    .then(() => { if (btn) btn.disabled = false; SlideMenu.open(); })
    .catch(() => {
      if (btn) btn.disabled = false;
      console.warn("メニューを読み込めませんでした");
    });
}
</script>

<script src="app.js"></script>
</body>
</html>
