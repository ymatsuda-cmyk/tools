<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>バグ管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>バグ管理</h1>
    <div class="toolbar">
      <div class="view-switch" role="tablist">
        <button id="btn-view-status"   class="view-btn active" role="tab">バグ状況</button>
        <button id="btn-view-assignee" class="view-btn"        role="tab">割り当て</button>
        <button id="btn-view-version"  class="view-btn"        role="tab">リリース</button>
        <button id="btn-view-trend"    class="view-btn"        role="tab">推移</button>
      </div>

      <button id="btn-add-new" class="btn primary">➕ 新規追加</button>
      <button id="btn-reload" class="btn">↻ 再読込</button>
      <span id="status-msg" class="status-msg"></span>
    </div>

    <div class="filters">
      <input type="search" id="filter-text" placeholder="🔍 タイトル/担当者/タグ で絞り込み" />
      <select id="filter-priority">
        <option value="">優先度: すべて</option>
        <option value="高">高</option>
        <option value="中">中</option>
        <option value="低">低</option>
      </select>
      <select id="filter-status">
        <option value="">状況: すべて</option>
        <option>新規</option>
        <option>解析</option>
        <option>修正</option>
        <option>確認</option>
        <option>再発</option>
        <option>完了</option>
      </select>
    </div>
  </header>

  <main>
    <section id="view-status" class="view active">
      <div id="kanban-board-status" class="kanban-board"></div>
    </section>

    <section id="view-assignee" class="view">
      <div id="kanban-board-assignee" class="kanban-board"></div>
    </section>

    <section id="view-version" class="view">
      <div id="kanban-board-version" class="kanban-board version-kanban"></div>
    </section>

    <section id="view-trend" class="view">
      <div class="trend-container">
        <div class="chart-container">
          <canvas id="trendChart" width="800" height="400"></canvas>
        </div>
        <div class="stats-container">
          <h4>優先度別完了率</h4>
          <table id="statsTable" class="stats-table">
            <thead>
              <tr>
                <th rowspan="2">優先度</th>
                <th rowspan="2">総件数</th>
                <th colspan="2">修正済</th>
                <th colspan="2">完了</th>
              </tr>
              <tr>
                <th>件数</th>
                <th>完了率</th>
                <th>件数</th>
                <th>完了率</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">バグ詳細</h2>
        <button id="modal-close" class="btn-icon">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-save" class="btn primary">保存</button>
        <button id="modal-cancel" class="btn">閉じる</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <span id="env-label"></span>
    <span id="row-count"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
