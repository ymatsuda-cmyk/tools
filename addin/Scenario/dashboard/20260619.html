<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>テスト進捗ダッシュボード</title>
<script src="../chart.umd.min.js"></script>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surf2:#273548;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--yellow:#facc15;--red:#f87171;--purple:#c084fc;--orange:#fb923c}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.hdr h1{font-size:16px;font-weight:700;color:var(--accent);white-space:nowrap}
.meta{color:var(--muted);font-size:12px;margin-left:auto}
.tabs{display:flex;gap:4px;padding:12px 22px 0;border-bottom:1px solid var(--border)}
.tab{padding:7px 16px;border-radius:7px 7px 0 0;cursor:pointer;color:var(--muted);border:1px solid transparent;border-bottom:none;font-size:13px;transition:.15s}
.tab.active{background:var(--surface);color:var(--text);border-color:var(--border)}
.pane{display:none;padding:18px}.pane.active{display:block}
.grid{display:grid;gap:13px}
.g4{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.card h2{font-size:11px;color:var(--muted);margin-bottom:9px;text-transform:uppercase;letter-spacing:.06em}
.kpi{font-size:28px;font-weight:700;line-height:1}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:4px}
.bar{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden;margin:7px 0}
.bar-f{height:100%;border-radius:3px}
.ch{position:relative;height:300px}
table{width:100%;border-collapse:collapse}
th{background:var(--surf2);padding:8px 11px;text-align:left;font-size:11px;color:var(--muted);font-weight:600}
td{padding:8px 11px;border-bottom:1px solid var(--border);font-size:13px}
tr:hover td{background:var(--surf2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.s新規{background:#1e3a5f;color:#60a5fa}.s解析中{background:#3b2f00;color:#facc15}
.s修正中{background:#2d1b00;color:#fb923c}.s確認中{background:#1a2e1a;color:#4ade80}.s完了{background:#1e1b2e;color:#c084fc}
.sv重大{background:#450a0a;color:#f87171}.sv高{background:#431407;color:#fb923c}
.sv中{background:#2d2a00;color:#facc15}.sv低{background:#0a2a1a;color:#4ade80}
.ph-t{display:flex;gap:4px}
.ph-b{padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;transition:.15s}
.ph-b.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.dt-c{display:flex;align-items:center;gap:7px}
.dt-c label{color:var(--muted);font-size:12px}
.dt-c input{background:var(--surf2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:4px 9px;font-size:13px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:11px}
.cc{background:var(--surf2);border:1px solid var(--border);border-radius:9px;padding:14px}
.cc-name{font-size:12px;color:var(--text);margin-bottom:9px;font-weight:600}
.cc-row{display:flex;gap:14px;margin-bottom:7px;flex-wrap:wrap}
.cc-num span{font-size:10px;color:var(--muted);display:block}
.cc-num strong{font-size:17px}
.vel-row{display:flex;gap:8px;margin:9px 0}
.vel-box{flex:1;background:var(--bg);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
.vel-box .vl{color:var(--muted);font-size:10px;margin-bottom:3px}
.vel-box .vv{font-size:20px;font-weight:700;line-height:1}
.vel-box .vs{font-size:10px;color:var(--muted);margin-top:2px}
.db{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px}
.db-ok{background:#0f2a1a;color:var(--green)}.db-ng{background:#2a0a0a;color:var(--red)}.db-warn{background:#2a1a00;color:var(--yellow)}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <h1>🧪 テスト進捗ダッシュボード</h1>
  <div class="ph-t">
    <button class="ph-b active" data-ph="1">PH1</button>
    <button class="ph-b" data-ph="2">PH2</button>
  </div>
  <div class="dt-c"><label>基準日</label><input type="date" id="baseDate"></div>
  <div class="meta" id="meta"></div>
</div>
<div class="tabs">
  <div class="tab active" data-tab="overview">概要</div>
  <div class="tab" data-tab="burndown">バーンダウン</div>
  <div class="tab" data-tab="categories">分類別</div>
  <div class="tab" data-tab="bugs">バグ管理</div>
</div>

<!-- 概要タブ: KPI + 統合チャート（バーンダウン＋バグ累積） -->
<div class="pane active" id="tab-overview">
  <div class="grid g4" id="kpis"></div>
  <div class="card" style="margin-top:13px">
    <h2 id="ov-title">全体バーンダウン ＋ バグ累積</h2>
    <div class="ch" style="height:340px"><canvas id="co-combo"></canvas></div>
  </div>
</div>

<!-- バーンダウンタブ -->
<div class="pane" id="tab-burndown">
  <div class="card">
    <h2 id="bd-title">全体バーンダウン</h2>
    <div class="ch" style="height:340px"><canvas id="cm-burn"></canvas></div>
  </div>
  <div class="grid g2" id="cat-charts" style="margin-top:13px"></div>
</div>

<!-- 分類別タブ -->
<div class="pane" id="tab-categories">
  <div class="cat-grid" id="cat-summary"></div>
</div>

<!-- バグ管理タブ -->
<div class="pane" id="tab-bugs">
  <div class="grid g4" id="bug-kpis" style="margin-bottom:13px"></div>
  <div class="card">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px" id="bug-filters"></div>
    <div style="overflow:auto;max-height:58vh">
      <table><thead><tr><th>ID</th><th>重要度</th><th>ステータス</th><th>タイトル</th><th>発生日</th><th>分類</th></tr></thead>
      <tbody id="bug-tbody"></tbody></table>
    </div>
  </div>
</div>

// generatedDateをそのまま基準日として使う（UTCズレ回避）
const [gy,gm,gd] = D.generatedDate.split("-").map(Number);
let BASE = new Date(gy, gm-1, gd);  // ローカル時刻でコンストラクト
let PH   = 1;
let BF   = {
  status:   new Set(["新規","解析中","修正中","確認中","完了"]),
  severity: new Set(["重大","高","中","低"])
};
const CH = {};

(()=>{
  const p=new URLSearchParams(location.search);
  const d=p.get("date");
  if(d){
    const m1=d.match(/^(\d{4})-(\d{2})-(\d{2})$/),m2=d.match(/^(\d{4})(\d{2})(\d{2})$/),m3=d.match(/^(\d{1,2})\/(\d{1,2})$/);
    if(m1) BASE=new Date(+m1[1],+m1[2]-1,+m1[3]);
    else if(m2) BASE=new Date(+m2[1],+m2[2]-1,+m2[3]);
    else if(m3) BASE=new Date(new Date().getFullYear(),+m3[1]-1,+m3[2]);
  }
  if(p.get("ph")==="2") PH=2;
})();

const ph   = ()=> PH===1?D.ph1:D.ph2;
const fmtD = s=> { if(!s)return"—"; const [y,m,d]=s.split("-").map(Number); return`${m}/${d}`; };
const pct  = (a,b)=> b>0?Math.round(a/b*100):0;
const dc   = id=> { if(CH[id]){CH[id].destroy();delete CH[id];} };
const todayLabel = ()=> { const d=BASE; return`${d.getMonth()+1}/${d.getDate()}`; };

Chart.defaults.color="#94a3b8";
Chart.defaults.borderColor="#334155";

function todayPlugin(dates){
  const ti=dates.indexOf(todayLabel());
  if(ti<0) return null;
  return {id:"tl",beforeDraw(ch){
    const yScale=ch.scales.yL||ch.scales.y;
    if(!yScale) return;
    const x=ch.scales.x.getPixelForValue(ti),{top,bottom}=yScale,c=ch.ctx;
    c.save();c.strokeStyle="#facc15";c.lineWidth=1.5;c.setLineDash([4,4]);
    c.beginPath();c.moveTo(x,top);c.lineTo(x,bottom);c.stroke();c.restore();
  }};
}

function drawBurn(id, bd){
  dc(id);
  const el=document.getElementById(id); if(!el) return;
  const tp=todayPlugin(bd.dates);
  const datasets=[
    {label:"予定残",   data:bd.plan,     borderColor:"#38bdf8", backgroundColor:"rgba(56,189,248,.07)", tension:.3, pointRadius:2, borderWidth:2},
    {label:"実績残",   data:bd.actual,   borderColor:"#4ade80", backgroundColor:"rgba(74,222,128,.07)", tension:.3, pointRadius:2, borderWidth:2, spanGaps:false},
  ];
  if(bd.forecast && bd.forecast.some(v=>v!=null)){
    datasets.push({label:"予測残（直近3営業日ベース）", data:bd.forecast,
      borderColor:"#fb923c", backgroundColor:"transparent",
      borderDash:[6,4], tension:.2, pointRadius:0, borderWidth:2, spanGaps:false});
  }
  const hasForecastDrop = bd.forecast && bd.actual && (()=>{
    const li=bd.actual.reduce((m,v,i)=>v!=null?i:m,-1);
    if(li<0||li+1>=bd.forecast.length) return false;
    const aVal=bd.actual[li], fNext=bd.forecast[li+1];
    return fNext!=null && Math.abs(aVal-fNext)>1;
  })();
  CH[id]=new Chart(el,{type:"line", plugins:tp?[tp]:[],
    data:{labels:bd.dates, datasets},
    options:{responsive:true, maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{position:"top",labels:{boxWidth:20,font:{size:11}}},
        subtitle:{display:hasForecastDrop, text:"※予測線は直近3営業日の実績が取れたカテゴリのみ対象（予測不能カテゴリは除外）",
          color:"#fb923c", font:{size:10}, padding:{bottom:4}},
      },
      scales:{x:{ticks:{maxTicksLimit:16,maxRotation:45}}, y:{beginAtZero:true}}}
  });
}

function drawComboChart(){
  dc("co-combo");
  const el=document.getElementById("co-combo"); if(!el) return;
  const bd=ph().burndown;
  const tp=todayPlugin(bd.dates);
  const td=D.bugTrend;
  const todayLbl=todayLabel();
  const todayIdx=bd.dates.indexOf(todayLbl);

  // バグ累積をBD日付軸にアライン（累積なので前値を持続）
  const bugMap={};
  td.dates.forEach((dl,i)=>{ bugMap[dl]=td.counts[i]; });
  let lastBug=0; let started=false;
  const bugData=bd.dates.map((dl,i)=>{
    if(bugMap[dl]!=null){ lastBug=bugMap[dl]; started=true; }
    if(!started) return null;
    if(todayIdx>=0 && i>todayIdx) return null;
    return lastBug;
  });

  const datasets=[
    {label:"予定残",data:bd.plan,   borderColor:"#38bdf8",backgroundColor:"rgba(56,189,248,.07)",tension:.3,pointRadius:2,borderWidth:2,yAxisID:"yL"},
    {label:"実績残",data:bd.actual, borderColor:"#4ade80",backgroundColor:"rgba(74,222,128,.07)",tension:.3,pointRadius:2,borderWidth:2,spanGaps:false,yAxisID:"yL"},
  ];
  if(bd.forecast&&bd.forecast.some(v=>v!=null)){
    datasets.push({label:"予測残（直近3営業日）",data:bd.forecast,
      borderColor:"#fb923c",backgroundColor:"transparent",
      borderDash:[6,4],tension:.2,pointRadius:0,borderWidth:2,spanGaps:false,yAxisID:"yL"});
  }
  datasets.push({
    label:"累積バグ数",
    data:bugData,
    borderColor:"#f87171",backgroundColor:"rgba(248,113,113,.15)",
    tension:.3,pointRadius:2,borderWidth:2,fill:true,spanGaps:false,
    yAxisID:"yR",
  });

  CH["co-combo"]=new Chart(el,{
    type:"line", plugins:tp?[tp]:[],
    data:{labels:bd.dates, datasets},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{legend:{position:"top",labels:{boxWidth:20,font:{size:11}}}},
      scales:{
        x:{ticks:{maxTicksLimit:16,maxRotation:45}},
        yL:{type:"linear",position:"left",  beginAtZero:true,
            title:{display:true,text:"残件数",font:{size:11},color:"#94a3b8"}},
        yR:{type:"linear",position:"right", beginAtZero:true,
            grid:{drawOnChartArea:false},
            title:{display:true,text:"累積バグ数",font:{size:11},color:"#f87171"},
            ticks:{color:"#f87171"}},
      }
    }
  });
}

  const bugPrevTxt=bugPrev>0?` <span style="font-size:11px;color:var(--red)">(+${bugPrev})</span>`:"";
  const cards=[
    {label:"総シナリオ数",val:total,  sub:"件",color:"var(--accent)", barPct:100},
    {label:"予定消化",    val:planned,sub:`件 (${pct(planned,total)}%) <span style="font-size:11px;color:var(--muted)">(+${totalPlanDiff})</span>`,color:"var(--accent)", barPct:pct(planned,Math.max(1,total))},
    {label:"実績消化",    val:actual, sub:`件 (${pct(actual,total)}%) <span style="font-size:11px;color:${totalDiff>0?'var(--green)':totalDiff<0?'var(--red)':'var(--muted)'}">(${diffSign}${totalDiff})</span>`,color:actual>=planned?"var(--green)":"var(--red)", barPct:pct(actual,Math.max(1,total))},
    {label:"未解決バグ",  val:open,   sub:`件 / 全${totalBugs}件${bugPrevTxt}`,color:open>0?"var(--yellow)":"var(--green)", barPct:pct(totalBugs-open,Math.max(1,totalBugs))},
  ];
  document.getElementById("kpis").innerHTML=cards.map(c=>`<div class="card">
    <h2>${c.label}</h2>
    <div class="kpi" style="color:${c.color}">${c.val}</div>
    <div class="kpi-sub">${c.sub}</div>
    <div class="bar"><div class="bar-f" style="width:${Math.min(100,c.barPct)}%;background:${c.color}"></div></div>
  </div>`).join("");
}

function renderBurndownPane(){
  const p=ph();
  document.getElementById("bd-title").textContent=`全体バーンダウン (PH${PH})`;
  drawBurn("cm-burn", p.burndown);
  const cont=document.getElementById("cat-charts"); cont.innerHTML="";
  Object.entries(p.categoryBurndown||{}).forEach(([cat,bd],i)=>{
    const id=`cc${i}`;
    cont.innerHTML+=`<div class="card"><h2>${cat}</h2><div class="ch"><canvas id="${id}"></canvas></div></div>`;
    setTimeout(()=>drawBurn(id,bd),0);
  });
}

function renderCatSummary(){
  const p=ph();
  document.getElementById("cat-summary").innerHTML=p.categories.map(c=>{
    const ap=pct(c.actualDone,c.total), pp=pct(c.planDone,c.total);
    const diff=c.actualDone-c.planDone;
    const diffTxt=diff>=0?`<span style="color:var(--green)">+${diff}件 進行</span>`:`<span style="color:var(--red)">${diff}件 遅延</span>`;
    const pd=c.predictEndDate||c.planEndDate;
    const over=pd&&c.planEndDate&&pd>c.planEndDate;
    const pv=c.planVelocity||0, av=c.actualVelocity||0;
    const vColor=av>=pv?"var(--green)":av>=pv*0.8?"var(--yellow)":"var(--red)";
    const vRatio=pv>0?Math.round(av/pv*100):0;
    const r3=c.recent3Dates&&c.recent3Dates.length?c.recent3Dates.join("・"):"データなし";
    return `<div class="cc">
      <div class="cc-name">${c.name}</div>
      <div class="cc-row">
        <div class="cc-num"><span>総数</span><strong>${c.total}</strong></div>
        <div class="cc-num">
          <span>予定消化</span>
          <strong style="color:var(--accent)">${c.planDone}
            <span style="font-size:11px;font-weight:400;color:var(--muted)"> (+${c.planDailyToday||0})</span>
          </strong>
        </div>
        <div class="cc-num">
          <span>実績消化</span>
          <strong style="color:${(c.actualDailyToday||0)>=(c.planDailyToday||0)?'var(--green)':'var(--red)'}">${c.actualDone}
            <span style="font-size:11px;font-weight:400;color:${(c.actualDailyToday||0)>(c.planDailyToday||0)?'var(--green)':(c.actualDailyToday||0)==(c.planDailyToday||0)?'var(--muted)':'var(--red)'}"> (+${c.actualDailyToday||0})</span>
          </strong>
        </div>
        <div class="cc-num"><span>営業日数</span><strong style="color:var(--muted);font-size:14px">${c.bizCount}日</strong></div>
      </div>
      <div class="bar"><div class="bar-f" style="width:${pp}%;background:var(--accent);opacity:.35"></div></div>
      <div class="bar"><div class="bar-f" style="width:${ap}%;background:${diff>=0?'var(--green)':'var(--red)'}"></div></div>
      <div class="vel-row">
        <div class="vel-box">
          <div class="vl">予定生産性</div>
          <div class="vv" style="color:var(--accent)">${pv.toFixed(2)}</div>
          <div class="vs">件/営業日（${c.bizCount}営業日）</div>
        </div>
        <div class="vel-box">
          <div class="vl">実績生産性（直近3営業日）</div>
          <div class="vv" style="color:${vColor}">${av.toFixed(2)}</div>
          <div class="vs">件/営業日（予定比 ${vRatio}%）<br><span style="color:var(--muted)">${r3}</span></div>
        </div>
      </div>
      <div style="margin-top:7px;font-size:12px;display:flex;gap:9px;align-items:center;flex-wrap:wrap">
        ${diffTxt}
        <span class="db ${over?'db-ng':'db-ok'}">予測完了 ${fmtD(pd)}</span>
        <span style="color:var(--muted)">計画 ${fmtD(c.planEndDate)}</span>
      </div>
    </div>`;
  }).join("");
}

function renderBugKPIs(){
  document.getElementById("bug-kpis").innerHTML=[
    {label:"新規",   val:D.bugs.filter(b=>b.status==="新規").length,color:"var(--accent)"},
    {label:"対応中", val:D.bugs.filter(b=>["解析中","修正中","確認中"].includes(b.status)).length,color:"var(--yellow)"},
    {label:"完了",   val:D.bugs.filter(b=>b.status==="完了").length,color:"var(--green)"},
    {label:"重大",   val:D.bugs.filter(b=>b.severity==="重大").length,color:"var(--red)"},
  ].map(c=>`<div class="card"><h2>${c.label}</h2><div class="kpi" style="color:${c.color}">${c.val}</div></div>`).join("");
}

function toggleFilter(key, val){
  if(BF[key].has(val)) BF[key].delete(val);
  else BF[key].add(val);
  renderBugTable();
  renderBugFilters();
}
function renderBugFilters(){
  const btn=(val,key)=>{
    const active=BF[key].has(val);
    return `<button onclick="toggleFilter('${key}','${val}')" style="padding:3px 10px;border-radius:20px;border:1px solid ${active?'var(--accent)':'var(--border)'};background:${active?'var(--accent)':'transparent'};color:${active?'#000':'var(--muted)'};cursor:pointer;font-size:12px">${val}</button>`;
  };
  document.getElementById("bug-filters").innerHTML=
    `<span style="color:var(--muted);font-size:12px">ステータス:</span>`+["新規","解析中","修正中","確認中","完了"].map(s=>btn(s,"status")).join("")+
    `<span style="color:var(--muted);font-size:12px;margin-left:8px">重要度:</span>`+["重大","高","中","低"].map(s=>btn(s,"severity")).join("");
}

function mdToNum(md){
  if(!md) return 0;
  const p=md.split("/"); return parseInt(p[0])*100+parseInt(p[1]);
}
function renderBugTable(){
  const filtered=D.bugs
    .filter(b=>BF.status.has(b.status) && BF.severity.has(b.severity))
    .sort((a,b)=>mdToNum(b.date)-mdToNum(a.date));  // 発生日降順
  document.getElementById("bug-tbody").innerHTML=filtered
    .map(b=>`<tr><td style="font-family:monospace">${b.id}</td>
      <td><span class="badge sv${b.severity}">${b.severity}</span></td>
      <td><span class="badge s${b.status}">${b.status}</span></td>
      <td>${b.title}</td><td>${b.date}</td>
      <td style="color:var(--muted)">${b.category}</td></tr>`).join("");
}

document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab,.pane").forEach(e=>e.classList.remove("active"));
  t.classList.add("active");
  document.getElementById("tab-"+t.dataset.tab).classList.add("active");
  if(t.dataset.tab==="burndown")   renderBurndownPane();
  if(t.dataset.tab==="categories") renderCatSummary();
  if(t.dataset.tab==="bugs"){renderBugKPIs();renderBugFilters();renderBugTable();}
}));
document.querySelectorAll(".ph-b").forEach(b=>b.addEventListener("click",()=>{
  PH=+b.dataset.ph;
  document.querySelectorAll(".ph-b").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); refresh();
}));
document.getElementById("baseDate").addEventListener("change",e=>{
  if(e.target.value){const [y,m,d]=e.target.value.split("-").map(Number);BASE=new Date(y,m-1,d);refresh();}
});

function refresh(){
  renderKPIs();
  drawComboChart();
  const at=document.querySelector(".tab.active")?.dataset.tab;
  if(at==="burndown")   renderBurndownPane();
  if(at==="categories") renderCatSummary();
  if(at==="bugs"){renderBugKPIs();renderBugFilters();renderBugTable();}
  document.getElementById("meta").textContent=
    `生成日: ${D.generatedDate} | 基準日: ${BASE.toLocaleDateString("ja-JP")} | PH${PH}`;
}

// generatedDateを基準日として強制設定（キャッシュ・タイムゾーン問題を回避）
const [_gy,_gm,_gd]=D.generatedDate.split("-").map(Number);
BASE=new Date(_gy,_gm-1,_gd);
document.getElementById("baseDate").value=D.generatedDate;
refresh();
</script>
</body>
</html>
