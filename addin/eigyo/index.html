<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>営業報告</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <button class="icon-btn" id="menu-btn" title="メニュー" onclick="openMenu()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M2 4h12M2 8h12M2 12h12" stroke-linecap="round"/>
    </svg>
  </button>
  <span class="title">営業報告</span>
  <span class="version" id="version-label"></span>
  <span class="demo-badge" id="demo-badge" style="display:none">DEMO</span>
  <span class="spacer"></span>
  <button class="btn-new" onclick="openNewModal()">＋ 新規入力</button>
  <button class="icon-btn" title="再読み込み" onclick="init()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 1.5v3h-3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- タブバー -->
<div class="tab-bar" id="tab-bar">
  <button class="tab active" data-tab="list" onclick="switchTab('list')">一覧</button>
  <button class="tab" data-tab="kanban" onclick="switchTab('kanban')">カンバン</button>
  <button class="tab" data-tab="agg" onclick="switchTab('agg')">集計</button>
</div>

<!-- フィルタバー（一覧・カンバン共通） -->
<div class="filter-bar" id="filter-bar">
  <div class="search-box">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5 14 14" stroke-linecap="round"/>
    </svg>
    <input type="search" id="search-input" placeholder="検索（内容・取引先・ID）" autocomplete="off">
    <button class="search-clear" id="search-clear" title="クリア">✕</button>
  </div>
  <select id="filter-type" class="filter-select" title="種別"></select>
  <div class="ms-wrap" id="ms-status">
    <button class="filter-select ms-btn" id="ms-status-btn" onclick="toggleStatusDD(event)">（状態: 全て）▾</button>
    <div class="ms-dd" id="status-dd" style="display:none"></div>
  </div>
  <select id="filter-client" class="filter-select" title="取引先"></select>
  <select id="filter-owner" class="filter-select" title="担当者"></select>
  <button class="chip-clear" onclick="clearFilters()">条件クリア</button>
</div>

<!-- ===== 一覧 ===== -->
<div class="pane" id="pane-list">
  <div id="list-container"></div>
</div>

<!-- ===== カンバン ===== -->
<div class="pane" id="pane-kanban" style="display:none">
  <div class="kanban-typebar" id="kanban-typebar"></div>
  <div class="stepper" id="kanban-stepper"></div>
  <div class="board" id="board"></div>
</div>

<!-- ===== 集計 ===== -->
<div class="pane" id="pane-agg" style="display:none">
  <div class="agg-seg">
    <button class="seg active" data-agg="hoshu" onclick="switchAgg('hoshu')">保守状況</button>
    <button class="seg" data-agg="mitsu" onclick="switchAgg('mitsu')">見積状況</button>
    <button class="seg" data-agg="uriage" onclick="switchAgg('uriage')">受注状況</button>
    <label class="hours-toggle" title="保守状況の対応工数の表示を切り替え">
      <input type="checkbox" id="hours-toggle-cb" checked onchange="toggleHours(this)"> 工数表示
    </label>
  </div>
  <div id="agg-container"></div>
</div>

<!-- ===== 新規入力モーダル（対応状況は起票後に編集画面で入力） ===== -->
<div class="modal-back" id="new-modal" style="display:none" onclick="if(event.target===this)closeNewModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">新規入力（起票）</span>
      <button class="icon-btn" onclick="closeNewModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>取引先 <span class="req">必須</span></label>
        <div class="hstack">
          <select id="in-client"></select>
          <button class="btn-sub" onclick="openCustomerModal()">＋顧客追加</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label>案件番号（自動採番）</label><input type="text" id="in-id" readonly class="ro"></div>
        <div class="form-row"><label>発生日</label><input type="date" id="in-occur"></div>
      </div>
      <div class="form-row">
        <label>種別 <span class="req">必須</span></label>
        <div class="type-seg" id="in-type-seg"></div>
      </div>
      <div class="form-row">
        <label>ワークフロー</label>
        <div class="stepper mini" id="in-stepper"></div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label>起票者</label><select id="in-owner"></select></div>
        <div class="form-row"><label>優先度</label>
          <select id="in-priority"><option value=""></option><option>高</option><option>中</option><option>低</option></select>
        </div>
      </div>
      <div class="form-row">
        <label>問合せ・提案内容 <span class="req">必須</span></label>
        <textarea id="in-content" rows="3"></textarea>
      </div>
      <div class="form-row">
        <label>備考</label>
        <textarea id="in-note" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-primary" onclick="saveNewRecord()">登録する</button>
      <span class="save-msg" id="in-msg"></span>
    </div>
  </div>
</div>

<!-- ===== 編集モーダル（ステージタブ式） ===== -->
<div class="modal-back" id="edit-modal" style="display:none" onclick="if(event.target===this)tryCloseEditModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="ed-title">案件編集</span>
      <button class="icon-btn" onclick="closeEditModalConfirm()">✕</button>
    </div>
    <div class="modal-body">
      <div class="stepper" id="ed-stepper"></div>

      <!-- 基本情報 -->
      <div class="form-grid">
        <div class="form-row"><label>案件番号</label><input type="text" id="ed-id" readonly class="ro"></div>
        <div class="form-row"><label>取引先</label><input type="text" id="ed-client" readonly class="ro"></div>
        <div class="form-row"><label>種別</label><select id="ed-type"></select></div>
        <div class="form-row"><label>状態</label><input type="text" id="ed-status" readonly class="ro"></div>
        <div class="form-row"><label>担当者（現在の対応者）</label><select id="ed-owner"></select></div>
        <div class="form-row"><label>優先度</label>
          <select id="ed-priority"><option value=""></option><option>高</option><option>中</option><option>低</option></select>
        </div>
      </div>

      <!-- ステージタブ（起票／対応中・見積中・作成中／商談中／確認中／受注） -->
      <div class="stage-tabs" id="ed-stage-tabs"></div>
      <div class="stage-body" id="ed-stage-body"></div>

      <!-- 備考（どのステージでも編集可） -->
      <div class="form-row" style="margin-top:10px">
        <label>備考（常時編集可）</label>
        <textarea id="ed-note" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-primary" onclick="saveEditRecord()">登録</button>
      <button class="btn-danger" id="ed-delete-btn" onclick="deleteRecord()">削除</button>
      <span class="save-msg" id="ed-msg"></span>
    </div>
  </div>
</div>

<!-- ===== 顧客追加モーダル ===== -->
<div class="modal-back" id="cust-modal" style="display:none" onclick="if(event.target===this)closeCustomerModal()">
  <div class="modal small">
    <div class="modal-head">
      <span class="modal-title">顧客マスタに追加</span>
      <button class="icon-btn" onclick="closeCustomerModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row"><label>顧客コード（英字2〜4文字） <span class="req">必須</span></label>
        <input type="text" id="cu-code" maxlength="4" placeholder="例: KM" style="text-transform:uppercase">
      </div>
      <div class="form-row"><label>取引先名 <span class="req">必須</span></label><input type="text" id="cu-name"></div>
      <div class="form-row"><label>窓口</label><input type="text" id="cu-contact"></div>
      <div class="form-row"><label>備考</label><input type="text" id="cu-note"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-primary" onclick="saveCustomer()">追加</button>
      <span class="save-msg" id="cu-msg"></span>
    </div>
  </div>
</div>

<!-- ===== 汎用ダイアログ（confirm/alert代替。Office環境ではwindow.confirm不可） ===== -->
<div class="modal-back" id="dialog-modal" style="display:none">
  <div class="modal xsmall">
    <div class="modal-body">
      <div id="dialog-msg" class="dialog-msg"></div>
    </div>
    <div class="modal-foot dialog-foot">
      <button class="btn-ghost" id="dialog-cancel" onclick="dialogRespond(false)">キャンセル</button>
      <button class="btn-primary" id="dialog-ok" onclick="dialogRespond(true)">OK</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
