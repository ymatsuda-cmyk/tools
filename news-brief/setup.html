<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sheets設定 — AIニュース速報</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:"Noto Sans JP",sans-serif; }
body { background:#F8FAFC; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.card { background:#fff; border-radius:16px; padding:28px 24px; width:100%; max-width:480px; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
h1 { font-size:18px; font-weight:900; color:#0F172A; margin-bottom:4px; }
.sub { font-size:12px; color:#64748B; margin-bottom:24px; }
label { display:block; font-size:12px; font-weight:700; color:#374151; margin-bottom:6px; }
input {
  display:block; width:100%;
  font-size:15px; padding:14px 16px;
  border:2px solid #E2E8F0; border-radius:10px;
  color:#0F172A; background:#fff;
  outline:none; -webkit-appearance:none;
  margin-bottom:8px;
}
input:focus { border-color:#2563EB; }
.hint { font-size:11px; color:#94A3B8; margin-bottom:20px; word-break:break-all; }
.current { font-size:11px; color:#059669; background:#F0FDF4; border:1px solid #BBF7D0; border-radius:8px; padding:8px 12px; margin-bottom:16px; word-break:break-all; display:none; }
.btn { display:block; width:100%; border-radius:10px; font-size:15px; font-weight:700; padding:15px; cursor:pointer; margin-bottom:10px; -webkit-appearance:none; border:none; }
.btn-p { background:#2563EB; color:#fff; }
.btn-r { background:#FEF2F2; color:#DC2626; border:1px solid #FECACA !important; display:none; }
.btn-g { background:#F1F5F9; color:#374151; }
.msg { border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; display:none; }
.msg-ok { background:#F0FDF4; color:#059669; }
.msg-err { background:#FEF2F2; color:#DC2626; }
</style>
</head>
<body>
<div class="card">
  <h1>⚙️ Sheets連携設定</h1>
  <p class="sub">GASのデプロイURLを設定してください</p>

  <div id="msg" class="msg"></div>
  <div id="current" class="current"></div>

  <label>GAS デプロイURL</label>
  <input
    id="inp"
    type="text"
    placeholder="https://script.google.com/macros/s/xxxxx/exec"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="none"
    spellcheck="false"
  >
  <div class="hint">「デプロイを管理」で取得した /exec で終わるURLを入力</div>

  <button class="btn btn-p" onclick="save()">保存して接続</button>
  <button class="btn btn-r" id="clr" onclick="clear()">連携を解除</button>
  <button class="btn btn-g" onclick="location.href='./'">← ダッシュボードに戻る</button>
</div>
<script>
var KEY = "ainews_gas_url";
var cur = localStorage.getItem(KEY) || "";
if (cur) {
  document.getElementById("inp").value = cur;
  document.getElementById("current").style.display = "block";
  document.getElementById("current").textContent = "現在: " + cur;
  document.getElementById("clr").style.display = "block";
}

function showMsg(text, ok) {
  var el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + (ok ? "msg-ok" : "msg-err");
  el.style.display = "block";
}

function save() {
  var url = document.getElementById("inp").value.trim();
  if (!url) { showMsg("❌ URLを入力してください", false); return; }
  if (url.indexOf("script.google.com") < 0) { showMsg("❌ GASのURLを入力してください", false); return; }
  localStorage.setItem(KEY, url);
  showMsg("✅ 保存しました！3秒後に戻ります", true);
  setTimeout(function(){ location.href = "./"; }, 3000);
}

function clear() {
  localStorage.removeItem(KEY);
  document.getElementById("inp").value = "";
  document.getElementById("current").style.display = "none";
  document.getElementById("clr").style.display = "none";
  showMsg("✅ 連携を解除しました", true);
}
</script>
</body>
</html>
